name: stock_screen (weekday 20:00 JST)
on:
  schedule:
    - cron: "0 11 * * 1-5"   # 20:00 JST (UTC+9)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # バックテスト分を加味して45→60に延長
    permissions:
      contents: write
    concurrency:
      group: stock_screen_20jst
      cancel-in-progress: false
    steps:
      - name: Checkout (full history for branch ops)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # backtest.py が使う追加ライブラリ（requirements.txtに含まれていない場合のみ）
          pip install yfinance pandas numpy --quiet

      - name: Download data_e.xls (JPX)
        run: |
          curl -L -o data_e.xls "https://www.jpx.co.jp/english/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_e.xls"
          test -s data_e.xls
          ls -l data_e.xls

      # ─────────────────────────────────────────
      # ① スクリーニング（既存・変更なし）
      # ─────────────────────────────────────────
      - name: Run screen
        env:
          TZ: Asia/Tokyo
        run: |
          python screen_yearend.py
          ls -la
          ls -la screen_*.csv || true

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screen_csv_${{ github.run_id }}
          path: |
            screen_*.csv

      # ─────────────────────────────────────────
      # ② バックテスト（新規追加）
      #    screen_*.csv がカレントディレクトリにある前提で実行
      # ─────────────────────────────────────────
      - name: Run backtest
        env:
          TZ: Asia/Tokyo
        run: |
          mkdir -p backtest_report
          # RESULTS_DIR=. でカレントディレクトリのCSVを読み込む
          RESULTS_DIR=. python backtest.py
        if: success()

      - name: Upload backtest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest_report_${{ github.run_id }}
          path: backtest_report/
          retention-days: 30

      # ─────────────────────────────────────────
      # ③ dataブランチへのアーカイブ（既存＋バックテスト結果を追加）
      # ─────────────────────────────────────────
      - name: Archive CSVs to data branch
        shell: bash
        env:
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          export TZ=Asia/Tokyo
          # 0) CSVがあるか確認
          shopt -s nullglob
          all_files=(screen_*.csv)
          if [ ${#all_files[@]} -eq 0 ]; then
            echo "No screen_*.csv found. Existing files:"
            ls -la
            exit 1
          fi
          # 1) 生成CSVから「最新日」を抽出
          latest="$(printf '%s\n' "${all_files[@]}" | sort | tail -n 1)"
          day="${latest#screen_}"
          day="${day%%_*}"
          # 当日分だけ
          files=(screen_"${day}"_*.csv)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CSV for day=${day}. Existing:"
            ls -la
            exit 1
          fi
          # バックテストレポートの退避
          bt_html=""
          shopt -s nullglob
          bt_files=(backtest_report/report_*.html backtest_report/trades_*.csv backtest_report/equity_*.csv)
          if [ ${#bt_files[@]} -gt 0 ]; then
            mkdir -p /tmp/backtest_report
            cp -f "${bt_files[@]}" /tmp/backtest_report/
            bt_html="found"
          fi
          # 退避（ブランチ切替で消えるのを防ぐ）
          rm -rf /tmp/screen_csv
          mkdir -p /tmp/screen_csv
          cp -f "${files[@]}" /tmp/screen_csv/
          # 2) dataブランチへ
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout -b data
          fi
          # 3) 日付アーカイブ（元ファイル名のまま）
          mkdir -p "archive/${day}"
          cp -f /tmp/screen_csv/*.csv "archive/${day}/"
          # バックテスト結果もアーカイブ
          if [ -n "$bt_html" ]; then
            mkdir -p "archive/${day}/backtest"
            cp -f /tmp/backtest_report/* "archive/${day}/backtest/"
          fi
          # 4) latest固定名
          latest_src=(/tmp/screen_csv/*.csv)
          mkdir -p "archive/latest"
          for f in "${latest_src[@]}"; do
            base="$(basename "$f")"
            kind="${base#screen_${day}_}"
            kind="${kind%.csv}"
            cp -f "$f" "archive/latest/${kind}.csv"
          done
          # バックテストのlatestも更新
          if [ -n "$bt_html" ]; then
            mkdir -p "archive/latest/backtest"
            cp -f /tmp/backtest_report/* "archive/latest/backtest/"
          fi
          git add -f archive
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "archive: ${day}" || echo "no changes"
          git push origin data
